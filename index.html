<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>KorfStat Pro</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <script>
    tailwind.config = {
      darkMode: 'class',
      theme: {
        extend: {
          colors: {
            gray: {
              750: '#2d3748',
            }
          },
          animation: {
            marquee: 'marquee 25s linear infinite',
          },
          keyframes: {
            marquee: {
              '0%': { transform: 'translateX(0%)' },
              '100%': { transform: 'translateX(-100%)' },
            }
          }
        }
      }
    }
  </script>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="./styles/tokens.css">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }

    /* Custom scrollbar for player lists */
    .scrollbar-hide::-webkit-scrollbar {
      display: none;
    }

    .scrollbar-hide {
      -ms-overflow-style: none;
      scrollbar-width: none;
    }

    /* Marquee Animation */
    @keyframes marquee {
      0% {
        transform: translateX(0);
      }

      100% {
        transform: translateX(-100%);
      }
    }

    .animate-marquee {
      animation: marquee 25s linear infinite;
    }

    /* Fix iOS/iPad double-tap-to-click hover bug */
    /* Only allow hovering on devices that have a real cursor */
    @media (hover: hover) {
      .hover\:scale-110:hover { transform: scale(1.1); }
      .hover\:bg-gray-200:hover { background-color: rgb(229 231 235); }
      .hover\:border-indigo-500:hover { border-color: rgb(79 70 229); }
      .hover\:shadow-lg:hover { --tw-shadow: 0 10px 15px -3px rgb(0 0 0 / 0.1), 0 4px 6px -4px rgb(0 0 0 / 0.1); box-shadow: var(--tw-ring-offset-shadow, 0 0 #0000), var(--tw-ring-shadow, 0 0 #0000), var(--tw-shadow); }
    }

    @media (hover: none) {
      /* Suppress hover transitions on touch devices */
      [class*="hover:"]:hover {
        transform: none !important;
        transition: none !important;
      }
    }
  </style>


</head>

<body class="bg-gray-50 text-gray-900">
  <div id="root"></div>
  <script type="module" src="./index.tsx"></script>
</body>

</html>
